<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="aurora">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة الموظفين | Mr Mahmoud Delivery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --cyan: #22d3ee;
      --purple: #a855f7;
      --gold: #facc15;
      --panel: rgba(15, 23, 42, 0.6);
      --border: rgba(255, 255, 255, 0.1);
      --accent-gradient: linear-gradient(135deg, var(--cyan), var(--purple));
    }
    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      color: white;
      background:
        radial-gradient(circle at top left, rgba(34,211,238,0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168,85,247,0.15), transparent 30%),
        linear-gradient(145deg, #020617 0%, #07111f 100%);
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    .glass {
      background: var(--panel);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .giant-clock-container {
      text-align: center;
      margin: 40px 0;
      text-shadow: 0 0 30px rgba(34,211,238,0.4);
    }
    .giant-time {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(to bottom, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 5px;
    }
    .giant-date {
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--cyan);
      font-weight: 700;
      margin-top: 10px;
    }
    .input-field {
      width: 100%; border-radius: 16px; background: rgba(0,0,0,0.4);
      border: 1px solid var(--border); padding: 16px; color: white;
      font-size: 1.1rem; text-align: center; transition: 0.3s;
    }
    .input-field:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(34,211,238,0.2); outline: none; }
    
    .btn {
      width: 100%; border-radius: 16px; padding: 16px; font-size: 1.2rem;
      font-weight: 900; cursor: pointer; transition: 0.3s; border: none;
    }
    .btn-primary { background: var(--accent-gradient); color: #020617; box-shadow: 0 0 20px rgba(168,85,247,0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(168,85,247,0.5); }
    .btn-danger { background: #ef4444; color: white; }
    .btn-info { background: #3b82f6; color: white; margin-top: 10px; }
    
    .hidden { display: none !important; }
    
    .result-card {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; margin-top: 15px; text-align: right;
    }
    .status-badge {
      display: inline-block; padding: 4px 12px; border-radius: 8px; font-weight: bold; font-size: 0.8rem;
      background: rgba(52,211,153,0.2); color: #34d399; border: 1px solid rgba(52,211,153,0.5);
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div id="loginView" class="max-w-md mx-auto w-full mt-10">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-black text-white">بوابة الموظفين</h1>
      <p class="text-slate-400 mt-2">تسجيل حضور ومتابعة الطلبات</p>
    </div>

    <div class="giant-clock-container">
      <div class="giant-time" id="loginClock">00:00</div>
      <div class="giant-date" id="loginDate">التاريخ</div>
    </div>

    <div class="glass p-8">
      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-slate-300 font-bold mb-2">كود الموظف (ID)</label>
          <input type="text" id="empCode" class="input-field" placeholder="مثال: A01" required>
        </div>
        <div>
          <label class="block text-slate-300 font-bold mb-2">كلمة المرور</label>
          <input type="password" id="empPass" class="input-field" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary mt-4" id="loginBtn">
          تسجيل الحضور (Start Shift)
        </button>
        <div id="loginMsg" class="text-center text-red-400 font-bold hidden"></div>
      </form>
    </div>
  </div>

  <div id="dashboardView" class="max-w-4xl mx-auto w-full hidden">
    <div class="glass p-6 flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
      <div>
        <h2 class="text-2xl font-black text-cyan-300">أهلاً، <span id="empNameDisplay"></span> 👋</h2>
        <p class="text-slate-400 text-sm mt-1">تم بدء الشيفت! يمكنك الانتقال للنظام أو البحث هنا.</p>
      </div>
      <div class="flex gap-2">
        <button onclick="goToBookingSystem()" class="btn btn-info w-auto px-6 py-3 text-sm rounded-xl">
          الذهاب للنظام 🚀
        </button>
        <button onclick="endShift()" class="btn btn-danger w-auto px-6 py-3 text-sm rounded-xl">
          تسجيل انصراف <i class="fa-solid fa-right-from-bracket mr-2"></i>
        </button>
      </div>
    </div>

    <div class="glass p-6 md:p-10 text-center">
      <i class="fa-solid fa-magnifying-glass text-5xl text-purple-400 mb-4 opacity-50"></i>
      <h3 class="text-2xl font-black mb-6">البحث السريع في الطلبات</h3>
      
      <form id="searchForm" class="flex flex-col md:flex-row gap-4 max-w-xl mx-auto">
        <input type="tel" id="searchPhone" class="input-field" placeholder="أدخل رقم هاتف العميل..." required>
        <button type="submit" class="btn btn-primary md:w-auto px-8" id="searchBtn">بحث</button>
      </form>
      <div id="searchMsg" class="text-center text-red-400 font-bold mt-4 hidden"></div>
    </div>

    <div id="searchResults" class="mt-8 space-y-4"></div>
  </div>

  <script>
    // ⚠️ ضع رابط السكربت المدمج الجديد هنا ⚠️
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHQBBksY41VLmX12EwDepAwr7-zXppMTTbknyOHbg6oy0u39TbXrOFRq_uvcJUPlt4/exec";

    let loggedInEmpCode = "";
    
    // ضع هنا رابط الصفحة الأخرى (صفحة الحجز) ليتم توجيه الموظف إليها
    const BOOKING_SYSTEM_URL = "https://futurersbooker-beep.github.io/Delivery/"; 

    function updateClock() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
      const dateString = now.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById("loginClock").innerText = timeString;
      document.getElementById("loginDate").innerText = dateString;
    }
    setInterval(updateClock, 1000);
    updateClock();

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const code = document.getElementById("empCode").value.trim().toUpperCase();
      const pass = document.getElementById("empPass").value.trim();
      const btn = document.getElementById("loginBtn");
      const msg = document.getElementById("loginMsg");

      btn.innerText = "جاري التحقق...";
      btn.disabled = true;
      msg.classList.add("hidden");

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "login", empCode: code, password: pass })
        });
        const result = await response.json();

        if (result.status === "success") {
          loggedInEmpCode = code;
          document.getElementById("empNameDisplay").innerText = result.data.name;
          document.getElementById("loginView").classList.add("hidden");
          document.getElementById("dashboardView").classList.remove("hidden");
          
          // توجيه اختياري وتلقائي لصفحة النظام مع تمرير الكود
          // window.location.href = BOOKING_SYSTEM_URL + "?emp=" + loggedInEmpCode;
        } else {
          msg.innerText = result.message;
          msg.classList.remove("hidden");
        }
      } catch (err) {
        msg.innerText = "حدث خطأ في الاتصال بالخادم.";
        msg.classList.remove("hidden");
      } finally {
        btn.innerText = "تسجيل الحضور (Start Shift)";
        btn.disabled = false;
      }
    });

    function goToBookingSystem() {
      if(!loggedInEmpCode) return;
      window.open(BOOKING_SYSTEM_URL + "?emp=" + loggedInEmpCode, "_blank");
    }

    async function endShift() {
      if (!confirm("هل أنت متأكد من إنهاء الشيفت وتسجيل الانصراف؟")) return;
      try {
        await fetch(SCRIPT_URL, {
          method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "logout", empCode: loggedInEmpCode })
        });
        loggedInEmpCode = "";
        document.getElementById("loginForm").reset();
        document.getElementById("dashboardView").classList.add("hidden");
        document.getElementById("loginView").classList.remove("hidden");
        document.getElementById("searchResults").innerHTML = "";
        alert("تم تسجيل الانصراف بنجاح.");
      } catch(err) {
        alert("خطأ في تسجيل الخروج.");
      }
    }

    document.getElementById("searchForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const phone = document.getElementById("searchPhone").value.trim();
      const btn = document.getElementById("searchBtn");
      const msg = document.getElementById("searchMsg");
      const resultsDiv = document.getElementById("searchResults");

      btn.innerText = "جاري..."; btn.disabled = true; msg.classList.add("hidden"); resultsDiv.innerHTML = "";

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: "search", phone: phone })
        });
        const result = await response.json();

        if (result.status === "success") {
          let html = `<h4 class="text-xl font-bold mb-4 text-cyan-200">نتائج البحث (${result.data.length} طلبات):</h4>`;
          result.data.forEach(req => {
            html += `
              <div class="result-card">
                <div class="flex justify-between items-start mb-4 border-b border-white/10 pb-4">
                  <div>
                    <h5 class="text-xl font-black text-gold">${req.id}</h5>
                    <p class="text-slate-400 text-sm mt-1"><i class="fa-regular fa-clock"></i> ${req.timestamp}</p>
                  </div>
                  <div class="status-badge">${req.status || "قيد الانتظار"}</div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm font-bold">
                  <div><span class="text-slate-400">الخدمة:</span> <span class="text-white">${req.serviceType}</span></div>
                  <div><span class="text-slate-400">رقم العميل:</span> <span class="text-cyan-300">${req.phone}</span></div>
                  <div class="md:col-span-2"><span class="text-slate-400">العنوان:</span> <span class="text-white">${req.details}</span></div>
                </div>
              </div>
            `;
          });
          resultsDiv.innerHTML = html;
        } else {
          msg.innerText = result.message; msg.classList.remove("hidden");
        }
      } catch (err) {
        msg.innerText = "حدث خطأ في البحث."; msg.classList.remove("hidden");
      } finally {
        btn.innerText = "بحث"; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
